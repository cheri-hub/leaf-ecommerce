services:
  frontend:
    image: ghcr.io/cheri-hub/leaf-ecommerce/frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - NEXT_PUBLIC_API_URL=${FRONTEND_URL}
    networks:
      - internal

  backend:
    image: ghcr.io/cheri-hub/leaf-ecommerce/backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5000}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - ConnectionStrings__Redis=${REDIS_CONNECTION}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - AbacatePay__ApiKey=${ABACATEPAY_API_KEY}
      - AbacatePay__WebhookSecret=${ABACATEPAY_WEBHOOK_SECRET}
      - App__FrontendUrl=${FRONTEND_URL}
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
